<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holly Cross College (Autonomous) | Student Complaints</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    *{
  font-family: "PT Serif", serif;
  font-weight: 700;
  font-style: normal;
}
    body {
        background: linear-gradient(to right, #e3f2fd, #ffffff);
        font-family: 'Segoe UI', sans-serif;
        min-height: 100vh;
    }
.college-logo {
    width: 95px;
    height: 95px;
    object-fit: contain;
    background: white;
    border-radius: 50%;
    padding: 6px;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
    margin-left: 15px;
transition: 0.2s ease-in-out;
    animation: slideIn 1s ease forwards;
}
.college-logo:hover{
      box-shadow: 0 0 11px rgba(0, 213, 246, 0.879);
}


/* Header text alignment */
.header-text {
    text-align: center;
    width: 100%;
    margin-right: 90px; /* balances logo space */
}

/* Logo entrance animation */
@keyframes slideIn {
    from {
        transform: translateX(-30px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

/* Mobile responsiveness */
@media (max-width: 576px) {
    .college-header {
        flex-direction: column;
        text-align: center;
    }

    .college-logo {
        margin: 0 0 10px 0;
        width: 60px;
        height: 60px;
    }

    .header-text {
        margin-right: 0;
    }
}

    .college-header {
        background: #0d47a1;
        color: white;
        padding: 20px;
        text-align: center;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .card {
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-custom {
        background: #0d47a1;
        color: white;
        border-radius: 30px;
        transition: 0.2s ease-in-out;
    }

    .btn-custom:hover {
        background: #5d99f4;
        transform: scale(1.1);

    }
        .btn-customm {
        background: #0d47a1;
        color: white;
        border-radius: 30px;
        transition: 0.2s ease-in-out;
    }

    .btn-customm:hover {
        background: #5d99f4;
        transform: scale(1.01);

    }

    .complaint-box {
        background: #f8f9fa;
        padding: 15px;
        border-left: 5px solid #5d99f4;
        border-radius: 8px;
        margin-bottom: 15px;
    }

    .hidden {
        display: none;
    }

    footer {
        text-align: center;
        margin-top: 40px;
        padding: 10px;
        color: #555;
    }
</style>
</head>

<body>

<!-- HEADER -->
<div class="college-header d-flex align-items-center position-relative">

   
    
    <div class="header-text">
        <h2>Holy Cross College (Autonomous)</h2>
        <p>Student Complaints & Queries Portal</p>
    </div>
</div>

<div class="container my-5">

    <!-- BUTTONS -->
    <div class="text-center mb-4">
        <button class="btn btn-custom me-2" onclick="showStudent()">Student</button>
        <button class="btn btn-dark" onclick="showAdmin()">Admin Login</button>
    </div>

    <!-- STUDENT SECTION -->
    <div id="studentSection" class="card p-4">
        <h4 class="text-center mb-3">Post Your Complaint / Query</h4>

        <div class="mb-3">
            <label class="form-label">Select Class</label>
            <select class="form-select" id="studentClass">
                <option value="">-- Choose --</option>
                <option>I UG</option>
                <option>II UG</option>
                <option>III UG</option>
                <option>I PG</option>
                <option>II PG</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Complaint / Query</label>
            <textarea class="form-control" id="studentComplaint" rows="4" placeholder="Write your issue here..."></textarea>
        </div>

        <button class="btn btn-customm w-100" onclick="submitComplaint()">Submit</button>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="adminLogin" class="card p-4 hidden">
        <h4 class="text-center mb-3">Admin Login</h4>

        <input type="text" id="adminUser" class="form-control mb-3" placeholder="Username">
        <input type="password" id="adminPass" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-customm w-100" onclick="adminLogin()">Login</button>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="adminPanel" class="card p-4 hidden">
        <h4 class="text-center mb-3">Student Complaints</h4>
        <div id="complaintsList"></div>
    </div>

</div>

<footer>
    © 2025 Holly Cross College (Autonomous)
</footer>

<script>
    function showStudent() {
        hideAll();
        document.getElementById("studentSection").classList.remove("hidden");
    }

    function showAdmin() {
        hideAll();
        document.getElementById("adminLogin").classList.remove("hidden");
    }

    function hideAll() {
        document.getElementById("studentSection").classList.add("hidden");
        document.getElementById("adminLogin").classList.add("hidden");
        document.getElementById("adminPanel").classList.add("hidden");
    }

    function submitComplaint() {
        let cls = document.getElementById("studentClass").value;
        let text = document.getElementById("studentComplaint").value;

        if (cls === "" || text === "") {
            alert("Please select class and enter complaint.");
            return;
        }

        let complaints = JSON.parse(localStorage.getItem("complaints")) || [];
        complaints.push({ class: cls, text: text, date: new Date().toLocaleString() });
        localStorage.setItem("complaints", JSON.stringify(complaints));

        alert("Complaint submitted successfully!");
        document.getElementById("studentClass").value = "";
        document.getElementById("studentComplaint").value = "";
    }

    function adminLogin() {
        let user = document.getElementById("adminUser").value;
        let pass = document.getElementById("adminPass").value;

        if (user === "admin" && pass === "admin123") {
            document.getElementById("adminLogin").classList.add("hidden");
            document.getElementById("adminPanel").classList.remove("hidden");
            loadComplaints();
        } else {
            alert("Invalid Admin Credentials");
        }
    }

    function loadComplaints() {
        let list = document.getElementById("complaintsList");
        list.innerHTML = "";

        let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

        if (complaints.length === 0) {
            list.innerHTML = "<p class='text-center'>No complaints submitted.</p>";
            return;
        }

        complaints.forEach(c => {
            let div = document.createElement("div");
            div.className = "complaint-box";
            div.innerHTML = `
                <strong>Class:</strong> ${c.class}<br>
                <strong>Date:</strong> ${c.date}<br>
                <strong>Complaint:</strong> ${c.text}
            `;
            list.appendChild(div);
        });
    }
</script>

</body>
</html>
